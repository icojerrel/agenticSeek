name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly run on Sundays

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync
        pip install pytest pytest-cov pytest-asyncio

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=sources --cov-report=xml --cov-report=html --cov-report=term-missing
      env:
        CI: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-${{ matrix.python-version }}
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy pytest

    - name: Run Black formatter check
      run: |
        black --check sources/ tests/

    - name: Run Flake8 linter
      run: |
        flake8 sources/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 sources/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run MyPy type checker
      run: |
        mypy sources/ --ignore-missing-imports --no-strict-optional || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install TruffleHog
      run: |
        pip install truffleHog

    - name: Run TruffleHog secret scan
      run: |
        trufflehog . --only-verified || echo "No verified secrets found"

    - name: Check for common security issues
      run: |
        pip install bandit
        bandit -r sources/ -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json
      if: always()

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Dockerfile
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.backend
        push: false
        tags: agenticseek-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend Dockerfile
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.frontend
        push: false
        tags: agenticseek-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check README exists
      run: |
        test -f README.md && echo "README.md exists" || echo "README.md missing"
        test -f README_CHS.md && echo "README_CHS.md exists" || echo "README_CHS.md missing"

    - name: Validate markdown files
      run: |
        pip install markdownlint-cli
        markdownlint README.md || true
